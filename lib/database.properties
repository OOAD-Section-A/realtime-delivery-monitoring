# Database Configuration for Real-Time Delivery Monitoring System
# SCM Database Module Configuration

# Database Connection Settings
db.url=jdbc:mysql://localhost:3306/scm_delivery_db
db.username=root
db.password=password
db.driver=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
db.pool.initialSize=5
db.pool.maxActive=20
db.pool.maxIdle=10
db.pool.minIdle=5
db.pool.maxWait=10000

# Schema Settings
db.schema.autoUpdate=true
db.schema.validationQuery=SELECT 1

# Transaction Settings
db.transaction.isolation=TRANSACTION_READ_COMMITTED
db.transaction.timeout=30

# Logging Settings
db.logging.enabled=true
db.logging.level=INFO
db.logging.slowQueryThreshold=1000

# Backup and Recovery
db.backup.enabled=true
db.backup.path=./backups
db.backup.schedule=0 2 * * *

# Performance Tuning
db.performance.batchSize=100
db.performance.fetchSize=50
db.performance.queryTimeout=30